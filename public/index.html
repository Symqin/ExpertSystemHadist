<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendeteksi Hadits Palsu (Maudhu)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-arabic { font-family: 'Amiri', serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <!-- Header -->
    <header class="bg-red-800 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold">Pendeteksi Hadits Palsu (Maudhu)</h1>
            <p class="text-sm text-red-200 mt-2">Hybrid NLP: Forward Chaining + TF-IDF &amp; Cosine Similarity berbasis Matan Indonesia</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Input Section -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Masukkan Teks Hadits</h2>
            <form id="searchForm">
                <textarea 
                    id="hadithInput" 
                    rows="4" 
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors resize-none text-gray-800"
                    placeholder="Contoh: Setiap amal perbuatan tergantung pada niat..."
                    required
                ></textarea>
                <div class="mt-4 flex justify-end">
                    <button 
                        type="submit" 
                        id="searchBtn"
                        class="bg-red-700 hover:bg-red-800 text-white font-medium py-2.5 px-6 rounded-lg transition-colors flex items-center shadow-sm"
                    >
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Deteksi Kepalsuan
                    </button>
                </div>
            </form>
        </section>

        <!-- Loading -->
        <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-600"></div>
            <span class="mt-4 text-gray-500 font-medium">Menganalisis dengan Hybrid NLP (TF-IDF + Cosine Similarity)...</span>
        </div>

        <!-- Error -->
        <div id="errorMessage" class="hidden bg-red-50 text-red-700 p-4 rounded-lg mb-8 border border-red-200 flex items-center">
            <svg class="w-6 h-6 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span id="errorText"></span>
        </div>

        <!-- Results Section -->
        <section id="resultsSection" class="hidden animate-fade-in">
            <div class="mb-3 flex items-center justify-between">
                <h3 class="text-xl font-semibold text-gray-800">Top 5 Hasil Pencarian</h3>
                <span id="bestScoreBadge" class="px-3 py-1 bg-green-100 text-green-800 border border-green-200 rounded-full text-sm font-bold shadow-sm">Highest Score: 0.0000</span>
            </div>

            <!-- Ringkasan Sistem Pakar (Rule-based) -->
            <div id="expertSummary" class="hidden mb-4"></div>

            <div id="resultsList" class="space-y-4">
                <!-- Results dynamically injected by app.js -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
